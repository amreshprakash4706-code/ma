version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumina-postgres
    restart: always
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina_secure_password_2026
      POSTGRES_DB: lumina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management
  pgadmin:
    image: dpage/pgadmin4
    container_name: lumina-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lumina.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
